services:
  - type: web
    name: fraudsense-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false  # Render Dashboard → Environment → coller l'Internal Database URL
      - key: ALLOWED_ORIGINS
        sync: false  # Render Dashboard → Environment → URL Vercel (ex: https://fraudsense.vercel.app)
