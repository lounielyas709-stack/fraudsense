services:
  - type: web
    name: fraudsense-api
    runtime: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false  # À renseigner dans le dashboard Render → Environment
      - key: ALLOWED_ORIGINS
        value: https://TON_FRONTEND.vercel.app  # Remplace par l'URL de ton frontend Vercel
